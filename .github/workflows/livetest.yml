name: livetest

on:
  push:
  pull_request:

jobs:
  livetest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Start MySQL + Redis
        working-directory: livetest
        run: docker compose up -d
      - name: Run end-to-end migration against real MySQL + Redis
        working-directory: livetest
        run: bash run.sh
      - name: Tear down
        if: always()
        working-directory: livetest
        run: docker compose down -v
