# LuckPerms on an SQL backend (schema confirmed against LuckPerms 5.x). It keys players by a dashed
# UUID string in two tables. Point "database" at the same database LuckPerms uses. SQLite migrates fine
# while the server runs; for MySQL just swap the database block (commented below).
name: luckperms
platform: SPIGOT
type: sql
enabled: true
database:
  type: sqlite
  database: plugins/LuckPerms/luckperms-sqlite.db
# database:
#   type: mysql
#   host: localhost
#   port: 3306
#   username: minecraft
#   password: secret
#   database: luckperms
# Each column defaults to a dashed UUID string. If a plugin stores UUIDs another way, set "format":
# "undashed" for 32 hex chars with no hyphens, or "binary" for a BINARY(16) column (bound as raw bytes).
replacers:
  - table: luckperms_players
    column: uuid
  - table: luckperms_user_permissions
    column: uuid
#  - table: some_binary_table
#    column: uuid
#    format: binary
