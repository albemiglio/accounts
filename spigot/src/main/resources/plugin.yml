name: Accounts
main: it.albemiglio.accounts.spigot.AccountsPlugin
version: 1.0-SNAPSHOT
api-version: "1.20"
author: albemiglio
commands:
  accounts:
    description: Account migration admin command
    usage: /accounts migrate <fromUuid> <toUuid> [username]
    permission: accounts.migrate
permissions:
  accounts.migrate:
    description: Allows running account migrations
    default: op
